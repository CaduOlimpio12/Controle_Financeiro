<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle Financeiro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>💰 Controle Financeiro</h1>
            <p class="subtitle">Sistema de Gestão Financeira Inteligente</p>

            <h2>Faça seu Login</h2>

            {% if erro %}
                <div class="error-message">
                    ⚠️ {{ erro }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <input name="username" placeholder="Usuário" type="text" required>
                </div>

                <div class="form-group">
                    <input name="password" placeholder="Senha" type="password" required>
                </div>

                <button type="submit">🔐 Entrar</button>
            </form>

            <div class="mt-3 text-center text-muted" style="font-size: 0.85rem;">
                <strong>Dados de Teste:</strong>
                <br>Usuário: <code>carlos</code> | Senha: <code>admin123</code>
                <br>Usuário: <code>camilly</code> | Senha: <code>admin123</code>
            </div>
        </div>
    </div>
</body>
</html>
